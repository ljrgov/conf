version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      timezone: "Asia/Shanghai"
      time: "09:00"
    
    # 【新增】将所有 Actions 更新合并为一个 PR，防止 PR 刷屏
    groups:
      github-actions-group:
        patterns:
          - "*"

    # 限制 PR 数量（配合 groups 后，通常只会保持 1 个 group PR）
    open-pull-requests-limit: 2
    
    # 自动打标签，方便管理
    labels:
      - "dependencies"
      - "github-actions"
